<header>SeedSigner Workshop 101</header>
<h2 id="part-0-the-hardware-wallet">Part 0: The Hardware Wallet</h2>
<div class="compact">
<h3 id="why-do-hardware-wallets-exist">Why Do Hardware Wallets Exist?</h3>
<p>Bitcoin was designed to be <strong>self-sovereign</strong> — you control your own keys, your own money.</p>
<h3 id="ways-of-storing-your-bitcoin">Ways of storing your Bitcoin:</h3>
<ul>
<li><strong>Exchanges</strong> — Not your keys, not your coins</li>
<li><strong>Software wallets</strong> — Convenient, but exposed to malware</li>
<li><strong>Hardware wallets</strong> — Keys stay offline, isolated from the internet</li>
</ul>
<h3 id="the-solution-hardware-wallets">The Solution: Hardware Wallets</h3>
<p>A hardware wallet keeps your <strong>private keys offline</strong>:</p>
<ul>
<li><strong>Store</strong> — Keys never touch an online device</li>
<li><strong>Manage</strong> — View balances without exposing keys</li>
<li><strong>Sign</strong> — Transactions signed offline, broadcast separately</li>
</ul>
<span class="success">
Your private keys stay offline. Your Bitcoin stays yours.
</span>

</code></pre>

<header>SeedSigner Workshop 101</header>
<h2 id="transparency-%E2%89%A0-open-source-%E2%89%A0-game-theory">Transparency ≠ Open Source ≠ Game Theory</h2>
<div class="two-col">
<div>
<h3 id="source-available">&quot;Source-Available&quot;</h3>
<ul>
<li><strong>Company owns the code</strong> — they set the rules</li>
<li><strong>View-only</strong> — you can read, but not fork or modify</li>
<li><strong>No security research</strong> — bug bounties controlled by the vendor</li>
<li><strong>Can be revoked</strong> — transparency is a privilege, not a right</li>
<li><strong>Can you verify what your device runs?</strong> <img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Hard — some vendors offer hashes</li>
</ul>
<p><span class="danger">This is a privilege, not a right.</span></p>
</div>
<div>
<h3 id="true-open-source-foss">True Open Source (FOSS)</h3>
<ul>
<li><strong>Community owns the code</strong> — fork, modify, redistribute</li>
<li><strong>No permission needed</strong> — copy, change, ship your own build</li>
<li><strong>Security research is free</strong> — anyone can audit and find bugs</li>
<li><strong>No single point of control</strong> — fork lives on even if maintainer quits</li>
<li><strong>Peer-reviewed by default</strong> — many eyes = many auditors</li>
</ul>
</div>

<header>SeedSigner Workshop 101</header>
<h2 id="no-company-no-sponsors-no-agenda">No Company. No Sponsors. No Agenda.</h2>
<p>SeedSigner because:</p>
<ul>
<li><strong>FOSS</strong> — Free and Open Source Software. Code is open for all and anyone is free to use, study, and modify. This principle allows others to contribute to developing and improving the software like a community.</li>
<li><strong>Community-driven</strong> — No VC funding, no investors demanding ROI</li>
<li><strong>No automatic updates</strong> — No forced firmware changes from a remote server</li>
<li><strong>No lock-in</strong> — Uses standard BIP39/BIP32/BIP84 standards</li>
<li><strong>No markup</strong> — You pay component cost, not brand premium</li>
<li><strong>No supply chain risk</strong> — Buy parts from any retailer</li>
<li><strong>Affordable sovereignty</strong> — Enterprise-grade security for under $50. No brand markup. No planned obsolescence. No subscription fees.</li>
</ul>
</section>

<header>SeedSigner Workshop 101</header>
<h2 id="eventually-foss-wins--this-is-the-way">Eventually FOSS Wins — This Is the Way</h2>
<p><strong>Why?</strong></p>
<ul>
<li><strong>People and companies die.</strong> Open-source outlives its creators — the code persists, evolves, and endures beyond any single <strong>lifetime</strong>.</li>
<li><strong>No board of directors. No shareholders.</strong> Proprietary software is steered by profit motives and short-term vision — extract value from customers, move on. FOSS answers only to what works and what users actually need.</li>
<li><strong>Open to be picked up by anyone.</strong> The community takes the code forward, driven by pure end-user needs and pure engineering problems — a <strong>vision that transcends lifetimes</strong>.</li>
</ul>
</section>

<header>SeedSigner Workshop 101</header>
<h2 id="what-stateless-actually-means">What &quot;Stateless&quot; Actually Means</h2>
<div class="two-col">
<div>
<h3 id="every-other-wallet">Every Other Wallet</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌──────────────────────┐
│  Hardware Wallet      │
│  ┌──────────────────┐ │
│  │ Flash Memory      │ │
│  │ Seed: ENC(12 words)│ │
│  │ Settings: saved   │ │
│  └──────────────────┘ │
└──────────────────────┘
         ↓
  If stolen → attacker has
  persistent seed to attack
</code></pre>
</div>
<div>
<h3 id="seedsigner">SeedSigner</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌──────────────────────┐
│  Raspberry Pi Zero    │
│  ┌──────────────────┐ │
│  │ RAM (volatile)    │ │
│  │ Seed: via QR code │ │
│  │ Sign → DONE       │ │
│  │ RAM: CLEARED      │ │
│  └──────────────────┘ │
└──────────────────────┘
         ↓
  If stolen → nothing to extract
  Seed lives on PAPER, not silicon
</code></pre>
</div>
</div>
<p><span class="success">Power off = keys gone. Forever. That's stateless security.</span></p>

<h3 id="what-you-need">What You Need:</h3>
<ul>
<li>Raspberry Pi Zero v1.3 Solder (~$30)</li>
<li>1.3-inch display with buttons (~$9)</li>
<li>Zero Camera Module 5MP (~$5)</li>
<li>MicroSD card (~$5)</li>
<li>3D-printed case (~$7)</li>
<li>Micro USB cable (~$1)</li>
</ul>
<p><strong>Total: ~$57</strong></p>

<h3 id="step-1-add-the-key-xpub">Step 1: Add the Key (XPUB)</h3>
<ol>
<li><strong>Open Nunchuk</strong> — Download on iOS / Android / Desktop</li>
<li><strong>Add a Key:</strong>
<ul>
<li>Tap <strong>Add a Key</strong> → <strong>+</strong></li>

<li>Name it (e.g., &quot;My SeedSigner&quot;)</li>
</ul>
</li>
<li><strong>Scan XPUB (Extended Public Key):</strong>
<ul>
<li>On SeedSigner: Navigate to <strong>Export XPUB</strong></li>
<li>Use your phone's camera to scan the QR code</li>
<li>Nunchuk imports the public key</li>
</ul>
</li>
</ol>
<p><span class="success">Private keys never leave the SeedSigner.</span></p>
